<!doctype html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>経費検収書 OCR取り込み</title>
<style>
  :root {
    color-scheme: light dark;
    --bg: #f5f6f8;
    --panel: #ffffff;
    --border: #dcdfe4;
    --text: #1c1f24;
    --muted: #6b7280;
    --accent: #2563eb;
    --accent-hover: #1d4ed8;
    --ok: #16a34a;
    --warn: #b45309;
    --err: #dc2626;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #14161a;
      --panel: #1d2025;
      --border: #33373e;
      --text: #e7e9ec;
      --muted: #9aa1ac;
      --accent: #3b82f6;
      --accent-hover: #60a5fa;
    }
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: "Hiragino Kaku Gothic ProN", "Yu Gothic", system-ui, sans-serif;
    background: var(--bg);
    color: var(--text);
    padding: 24px;
  }
  h1 { font-size: 20px; margin: 0 0 4px; }
  p.sub { color: var(--muted); margin: 0 0 20px; font-size: 13px; }
  .panel {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 20px;
    margin-bottom: 20px;
  }
  .pick-row { display: flex; align-items: center; gap: 10px; margin-bottom: 14px; }
  .pick-row button { margin-top: 0; }
  .pick-note { font-size: 12px; color: var(--muted); }
  .search-row { display: flex; flex-wrap: wrap; align-items: center; gap: 8px; margin-bottom: 14px; }
  .search-row input {
    padding: 8px 10px; border-radius: 6px; border: 1px solid var(--border);
    background: var(--panel); color: var(--text); font-size: 13px;
  }
  .search-row button { margin-top: 0; }
  .secondary-btn {
    background: transparent; color: var(--text); border: 1px solid var(--border);
  }
  .secondary-btn:hover { background: var(--bg); }
  .drop {
    border: 2px dashed var(--border);
    border-radius: 8px;
    padding: 24px;
    text-align: center;
    color: var(--muted);
    cursor: pointer;
  }
  .drop.dragover { border-color: var(--accent); color: var(--accent); }
  input[type="file"] { display: none; }
  .file-list { margin-top: 14px; display: flex; flex-direction: column; gap: 6px; }
  .file-row {
    display: flex; align-items: center; gap: 10px;
    font-size: 13px; padding: 6px 8px; border-radius: 6px;
    background: var(--bg);
  }
  .file-row { flex-wrap: wrap; }
  .file-row .name { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .file-error { flex-basis: 100%; font-size: 12px; color: var(--err); }
  .file-note { flex-basis: 100%; font-size: 12px; color: var(--muted); }
  .badge { font-size: 12px; padding: 2px 8px; border-radius: 999px; }
  .badge.pending { background: #e5e7eb; color: #374151; }
  .badge.processing { background: #dbeafe; color: #1e40af; }
  .badge.done { background: #dcfce7; color: var(--ok); }
  .badge.error { background: #fee2e2; color: var(--err); }
  .progress-wrap { margin-top: 16px; }
  .progress-bar {
    width: 100%; height: 14px; border-radius: 999px;
    background: var(--bg); border: 1px solid var(--border); overflow: hidden;
  }
  .progress-fill {
    height: 100%; width: 0%; background: var(--accent);
    transition: width 0.25s ease; border-radius: 999px;
  }
  .progress-label { margin-top: 6px; font-size: 12px; color: var(--muted); }
  button {
    background: var(--accent); color: #fff; border: none;
    padding: 10px 20px; border-radius: 6px; font-size: 14px;
    cursor: pointer; margin-top: 16px;
  }
  button:hover { background: var(--accent-hover); }
  button:disabled { background: #9ca3af; cursor: not-allowed; }
  table { width: 100%; border-collapse: collapse; font-size: 13px; }
  th, td { text-align: left; padding: 8px 10px; border-bottom: 1px solid var(--border); vertical-align: top; }
  th { color: var(--muted); font-weight: 600; white-space: nowrap; }
  .clickable-row { cursor: pointer; }
  .clickable-row:hover { background: var(--bg); }
  .delete-btn {
    margin-top: 0; padding: 4px 10px; font-size: 12px;
    background: transparent; color: var(--err); border: 1px solid var(--err);
  }
  .delete-btn:hover { background: var(--err); color: #fff; }
  .masked { color: var(--warn); font-size: 12px; display: block; }
  .thumb { width: 48px; height: 48px; object-fit: cover; border-radius: 4px; border: 1px solid var(--border); }
  .thumb-fallback {
    display: inline-flex; align-items: center; justify-content: center;
    width: 48px; height: 48px; border-radius: 4px; border: 1px solid var(--border);
    font-size: 20px; background: var(--bg);
  }
  .table-wrap { overflow-x: auto; }
  .empty { color: var(--muted); font-size: 13px; padding: 12px 0; }
  .pager { display: flex; align-items: center; justify-content: center; gap: 14px; margin-top: 16px; }
  .pager button { margin-top: 0; }
  .pager-label { font-size: 13px; color: var(--muted); }
  .modal-overlay {
    display: none;
    position: fixed; inset: 0; background: rgba(0, 0, 0, 0.6);
    align-items: center; justify-content: center; z-index: 1000; padding: 24px;
  }
  .modal-overlay.open { display: flex; }
  .modal-box {
    position: relative; background: var(--panel); border-radius: 10px;
    padding: 16px; max-width: min(90vw, 900px); max-height: 90vh;
    display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 12px;
  }
  .modal-box img { max-width: 100%; max-height: 70vh; border-radius: 6px; display: block; }
  .modal-nav { display: flex; align-items: center; justify-content: center; gap: 14px; }
  .modal-nav button { margin-top: 0; }
  .modal-nav-label { font-size: 13px; color: var(--muted); min-width: 60px; text-align: center; }
  .modal-close {
    position: absolute; top: -14px; right: -14px; margin-top: 0;
    width: 32px; height: 32px; padding: 0; border-radius: 50%;
    background: var(--panel); color: var(--text); border: 1px solid var(--border);
    font-size: 16px; line-height: 1; display: flex; align-items: center; justify-content: center;
  }
  .modal-close:hover { background: var(--err); color: #fff; border-color: var(--err); }
  .modal-fallback { font-size: 13px; color: var(--muted); padding: 20px; text-align: center; }
</style>
</head>
<body>
  <h1>経費検収書 OCR取り込み</h1>
  <p class="sub">画像を選択して「取り込み実行」を押すと、Geminiが内容を読み取りSupabaseへ格納します。検収金額がマスクされている場合は事前承認金額を採用します。</p>

  <div class="panel">
    <div class="pick-row">
      <button id="dirPickBtn" type="button">📁 フォルダを選択(取り込み後に自動移動)</button>
      <span class="pick-note" id="dirSupportNote"></span>
    </div>
    <div class="drop" id="drop">
      画像をドラッグ&ドロップ、またはクリックして選択(複数選択可・HEIC対応・自動移動なし)
    </div>
    <input type="file" id="fileInput" accept="image/*,.heic,.heif" multiple />
    <div class="file-list" id="fileList"></div>
    <div class="progress-wrap" id="progressWrap" style="display:none;">
      <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
      <div class="progress-label" id="progressLabel">0 / 0</div>
    </div>
    <button id="ingestBtn" disabled>取り込み実行</button>
  </div>

  <div class="panel">
    <h2 style="font-size:15px; margin-top:0;">取り込みデータ</h2>
    <div class="search-row">
      <input type="text" id="searchVendor" placeholder="取引先(部分一致)" />
      <input type="date" id="searchDueDate" title="支払予定日" />
      <input type="text" id="searchApprovalNo" placeholder="承認NO(部分一致)" />
      <button type="button" id="searchClearBtn" class="secondary-btn">クリア</button>
    </div>
    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>コード</th>
            <th>対象年月</th>
            <th>取引先</th>
            <th>経費項目</th>
            <th>事前承認金額</th>
            <th>検収金額</th>
            <th>税率</th>
            <th>検収月日</th>
            <th>支払予定日</th>
            <th>支払方法</th>
            <th>振込専用用紙</th>
            <th>変更理由(手書き)</th>
            <th>承認NO</th>
            <th>取込日</th>
            <th></th>
          </tr>
        </thead>
        <tbody id="docTableBody"></tbody>
      </table>
      <div class="empty" id="emptyMsg" style="display:none;">まだデータがありません</div>
    </div>
    <div class="pager">
      <button type="button" id="prevPageBtn" class="secondary-btn">← 戻る</button>
      <span class="pager-label" id="pagerLabel">1 / 1 ページ</span>
      <button type="button" id="nextPageBtn" class="secondary-btn">次へ →</button>
    </div>
  </div>

  <div class="modal-overlay" id="imageModal">
    <div class="modal-box">
      <button type="button" class="modal-close" id="modalCloseBtn">✕</button>
      <img id="modalImage" alt="" />
      <div class="modal-fallback" id="modalFallback" style="display:none;">
        このブラウザではプレビューできません(HEIC等)。<a id="modalOpenLink" href="#" target="_blank" rel="noopener">新しいタブで開く</a>
      </div>
      <div class="modal-nav">
        <button type="button" id="modalPrevBtn" class="secondary-btn">← 前の画像</button>
        <span class="modal-nav-label" id="modalNavLabel"></span>
        <button type="button" id="modalNextBtn" class="secondary-btn">次の画像 →</button>
      </div>
    </div>
  </div>

  <script type="module" src="app.js"></script>
</body>
</html>
